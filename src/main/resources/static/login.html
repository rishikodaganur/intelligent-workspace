<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intelligent Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
  :root {
    --bg-page: #0d0d0d;
    --bg-panel: rgba(22,22,22,0.85);

    --text-main: #f5f5f5;
    --text-muted: #a1a1aa;

    --accent: #ff3b3b;
    --accent-dark: #b91c1c;

    --border-soft: rgba(255,255,255,0.08);
}


/* GLOBAL */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}


::selection {
    background: rgba(255,59,59,.45);
    color: white;
}


body {

    font-family: "Inter", sans-serif;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;

    color: var(--text-main);

    background:
        radial-gradient(
            circle at 15% 20%,
            rgba(255,59,59,.22),
            transparent 30%
        ),

        radial-gradient(
            circle at 85% 80%,
            rgba(255,59,59,.18),
            transparent 35%
        ),

        radial-gradient(
            circle at 50% 50%,
            rgba(255,255,255,.03),
            transparent 50%
        ),

        linear-gradient(
            135deg,
            #050505,
            #111111,
            #050505
        );

}


/* Floating ambient glow */

body::before,
body::after {

    content: "";

    position: fixed;

    border-radius: 50%;

    filter: blur(90px);

    pointer-events: none;

}


body::before {

    width: 600px;
    height: 600px;

    top: -200px;
    left: -200px;

    background:
        radial-gradient(
            circle,
            rgba(255,59,59,.25),
            transparent 70%
        );

    animation:
        floatGlow 10s ease-in-out infinite;

}


body::after {

    width: 500px;
    height: 500px;

    right: -150px;
    bottom: -150px;

    background:
        radial-gradient(
            circle,
            rgba(255,59,59,.18),
            transparent 70%
        );

    animation:
        floatGlow 14s ease-in-out infinite reverse;

}


@keyframes floatGlow {

    0%,100% {
        transform: translate(0,0) scale(1);
    }

    50% {
        transform: translate(35px,25px) scale(1.08);
    }

}


/* LOGIN CARD */

.auth-card {

    position: relative;

    z-index: 5;

    width: 100%;
    max-width: 460px;

    padding: 52px 48px;

    text-align: center;

    border-radius: 28px;

    background:
        linear-gradient(
            145deg,
            rgba(28,28,28,.82),
            rgba(10,10,10,.9)
        );

    border:
        1px solid var(--border-soft);

    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);

    box-shadow:
        0 30px 80px rgba(0,0,0,.75),
        0 0 45px rgba(255,59,59,.15);

    overflow: hidden;

    animation:
        cardEntrance .8s cubic-bezier(.16,1,.3,1),
        breathe 5s ease-in-out infinite 1s;

    transition:
        transform .35s ease,
        box-shadow .35s ease;

}


/* Glow behind card */

.auth-card::after {

    content: "";

    position: absolute;

    inset: -90px;

    background:
        radial-gradient(
            circle,
            rgba(255,59,59,.14),
            transparent 70%
        );

    filter: blur(65px);

    z-index: -1;

}


/* Top highlight */

.auth-card::before {

    content: "";

    position: absolute;

    top: 0;
    left: 0;
    right: 0;

    height: 1px;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.55),
            transparent
        );

}


.auth-card:hover {

    transform: translateY(-8px);

    box-shadow:
        0 40px 90px rgba(0,0,0,.85),
        0 0 65px rgba(255,59,59,.25);

}


@keyframes breathe {

    0%,100% {

        box-shadow:
            0 30px 80px rgba(0,0,0,.75),
            0 0 45px rgba(255,59,59,.15);

    }

    50% {

        box-shadow:
            0 38px 95px rgba(0,0,0,.8),
            0 0 70px rgba(255,59,59,.25);

    }

}

/* =====================================================
   TITLE & SUBTITLE
   ===================================================== */

h2 {
    font-family: "Space Grotesk", sans-serif;
    font-size: clamp(1.1rem, 4.5vw, 1.7rem); 
    white-space: nowrap; 
    line-height: 1.2;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: white;
    margin-bottom: 12px;
    
    /* --- OPTICAL CENTERING FIXES --- */
    padding-left: .08em; /* Balances out the trailing letter-spacing on the right */
    transform: translateX(-3%); /* Nudges the entire block slightly left to center the underscore */
    /* ------------------------------- */
    
    text-shadow: 0 0 15px rgba(255,255,255,.12);
    animation: titleGlow 4s ease-in-out infinite;
}
h2 span {

    color: var(--accent);

    text-shadow:
        0 0 15px rgba(255,59,59,.85),
        0 0 35px rgba(255,59,59,.45);

}


h2::after {

    content: "";

    display: block;

    width: 70px;

    height: 3px;

    margin: 14px auto 0;

    border-radius: 999px;

    background:
        linear-gradient(
            90deg,
            transparent,
            var(--accent),
            transparent
        );

    box-shadow:
        0 0 15px rgba(255,59,59,.6);

}


@keyframes titleGlow {

    0%,100% {

        text-shadow:
            0 0 15px rgba(255,255,255,.12);

    }


    50% {

        text-shadow:
            0 0 30px rgba(255,255,255,.25),
            0 0 45px rgba(255,59,59,.22);

    }

}


/* =====================================================
   DESCRIPTION
   ===================================================== */

p {

    color: var(--text-muted);

    font-size: .95rem;

    line-height: 1.7;

    letter-spacing: .03em;

    margin-bottom: 36px;

}


/* =====================================================
   FORM GROUP
   ===================================================== */

.input-group {

    text-align: left;

    margin-bottom: 26px;

}


label {

    display: block;

    margin-bottom: 10px;

    font-size: .75rem;

    font-weight: 600;

    letter-spacing: .18em;

    text-transform: uppercase;

    color: var(--text-muted);

}


/* =====================================================
   INPUT FIELDS
   ===================================================== */

input {

    width: 100%;

    padding: 16px 18px;

    border-radius: 16px;

    border:
        1px solid rgba(255,255,255,.08);

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,.05),
            rgba(255,255,255,.02)
        );

    color: white;

    font-family: "Inter", sans-serif;

    font-size: 1rem;

    outline: none;

    transition:
        all .3s ease;

    backdrop-filter: blur(14px);

}


input::placeholder {

    color:
        rgba(255,255,255,.35);

}


input::selection {

    background:
        rgba(255,59,59,.45);

    color: white;

}


input:hover {

    border-color:
        rgba(255,59,59,.35);

}


input:focus {

    transform:
        translateY(-2px);

    border-color:
        var(--accent);

    box-shadow:
        0 0 0 4px rgba(255,59,59,.18),
        0 0 35px rgba(255,59,59,.28);

}


/* =====================================================
   PRIMARY BUTTON
   ===================================================== */

button {

    position: relative;

    width: 100%;

    overflow: hidden;

    padding: 16px 20px;

    border: none;

    border-radius: 16px;

    cursor: pointer;

    color: white;

    font-family: "Space Grotesk", sans-serif;

    font-size: .92rem;

    font-weight: 700;

    letter-spacing: .12em;

    text-transform: uppercase;

    background:
        linear-gradient(
            135deg,
            #ff5555,
            #dc2626,
            #991b1b
        );

    background-size: 200% 200%;

    box-shadow:
        0 15px 35px rgba(255,59,59,.35);

    transition:
        all .35s ease;

}


button::before {

    content: "";

    position: absolute;

    top: 0;

    left: -120%;

    width: 65%;

    height: 100%;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,.55),
            transparent
        );

    transform:
        skewX(-25deg);

    transition:
        left .75s ease;

}


button:hover {

    transform:
        translateY(-4px);

    background-position:
        100% 0;

    box-shadow:
        0 22px 50px rgba(255,59,59,.55);

}


button:hover::before {

    left: 150%;

}


button:active {

    transform:
        scale(.97);

}


button:focus-visible {

    outline: none;

    box-shadow:
        0 0 0 4px rgba(255,59,59,.25),
        0 18px 45px rgba(255,59,59,.45);

}


/* =====================================================
   LOGIN / REGISTER TOGGLE
   ===================================================== */

.toggle-text {

    position: relative;

    display: inline-block;

    margin-top: 28px;

    font-size: .9rem;

    color: var(--text-muted);

    cursor: pointer;

    transition:
        color .3s ease,
        transform .3s ease;

}


.toggle-text:hover {

    color: white;

    transform:
        translateY(-2px);

}


.toggle-text::after {

    content: "";

    position: absolute;

    left: 50%;

    bottom: -5px;

    width: 0;

    height: 2px;

    border-radius: 999px;

    transform:
        translateX(-50%);

    background:
        linear-gradient(
            90deg,
            var(--accent),
            #ff9090
        );

    box-shadow:
        0 0 12px rgba(255,59,59,.65);

    transition:
        width .35s ease;

}


.toggle-text:hover::after {

    width: 100%;

}


/* =====================================================
   ALERT BOXES
   ===================================================== */

.error-msg,
.success-msg {

    display: none;

    padding: 12px 16px;

    margin-bottom: 18px;

    border-radius: 14px;

    font-size: .85rem;

    backdrop-filter: blur(10px);

}


.error-msg {

    background:
        rgba(239,68,68,.12);

    border:
        1px solid rgba(239,68,68,.35);

    color:
        #ff8a8a;

}


.success-msg {

    background:
        rgba(16,185,129,.12);

    border:
        1px solid rgba(16,185,129,.35);

    color:
        #4ade80;

}


/* =====================================================
   SCROLLBAR
   ===================================================== */

::-webkit-scrollbar {

    width: 10px;

}


::-webkit-scrollbar-track {

    background:
        rgba(255,255,255,.03);

}


::-webkit-scrollbar-thumb {

    background:
        linear-gradient(
            180deg,
            #ff5555,
            #991b1b
        );

    border-radius: 999px;

}


::-webkit-scrollbar-thumb:hover {

    background:
        linear-gradient(
            180deg,
            #ff7777,
            #dc2626
        );

}


/* =====================================================
   RESPONSIVE
   ===================================================== */

@media (max-width: 500px) {

    body {
        padding: 18px;
    }

    .auth-card {
        width: 100%;
        padding: 38px 28px;
        border-radius: 24px;
    }

    /* THE FIX: We update the mobile h2 to respect the single line! */
    /* THE FIX: Smaller base font and tighter letter spacing for mobile */
    h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(0.85rem, 5vw, 1.35rem); /* Shrunk slightly to fit safely */
        white-space: nowrap; 
        font-weight: 700;
        letter-spacing: .02em; /* Tightened from .08em to prevent pushing right */
        text-transform: uppercase;
        color: white;
        line-height: 1.1;
        margin-bottom: 12px;
        width: 100%;
        text-align: center;
    }

    p {
        font-size: .88rem;
    }

    button {
        font-size: .82rem;
        padding: 15px;
    }

    .toggle-text {
        font-size: .82rem;
    }

}

/* =====================================================
   END OF PREMIUM LOGIN THEME
   ===================================================== */
</style>
</head>
<body>

    <div class="auth-card">
        <h2>INTELLIGENT<span>_</span>WORKSPACE</h2>
        <p id="subtitle">Enter your credentials to access the grid.</p>

        <div id="errorBox" class="error-msg">Invalid username or password.</div>
        <div id="successBox" class="success-msg"></div>

        <form id="authForm" action="/login" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" id="username" required autocomplete="off" onkeypress="handleEnter(event)" />
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" id="password" required onkeypress="handleEnter(event)" />
            </div>
            <button type="submit" id="actionBtn">Initialize Login</button>
        </form>

        <div class="toggle-text" onclick="toggleMode()" id="toggleBtn">New user? Register an identity.</div>
    </div>

    <script>
        let isLogin = true;

        // Check for error in URL (Spring Security automatically adds ?error on fail)
        if (window.location.search.includes('error')) {
            document.getElementById('errorBox').style.display = 'block';
        }

        // Force Enter key to trigger the submit button
        function handleEnter(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('actionBtn').click();
            }
        }

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('successBox').style.display = 'none';
            
            if (isLogin) {
                document.getElementById('subtitle').innerText = "Enter your credentials to access the grid.";
                document.getElementById('actionBtn').innerText = "Initialize Login";
                document.getElementById('toggleBtn').innerText = "New user? Register an identity.";
                // Re-enable form submission for Spring Security
                document.getElementById('authForm').onsubmit = null; 
            } else {
                document.getElementById('subtitle').innerText = "Register a new identity on the network.";
                document.getElementById('actionBtn').innerText = "Register Identity";
                document.getElementById('toggleBtn').innerText = "Already registered? Initialize Login.";
                // Override form submission to use our custom Registration API
                document.getElementById('authForm').onsubmit = handleRegister;
            }
        }

        function handleRegister(e) {
            e.preventDefault(); // Stop standard form submission
            
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            })
            .then(async response => {
                const text = await response.text();
                if (response.ok) {
                    document.getElementById('successBox').innerText = text;
                    document.getElementById('successBox').style.display = 'block';
                    document.getElementById('errorBox').style.display = 'none';
                    // Auto-switch back to login after 1.5 seconds
                    setTimeout(toggleMode, 1500); 
                } else {
                    document.getElementById('errorBox').innerText = text;
                    document.getElementById('errorBox').style.display = 'block';
                    document.getElementById('successBox').style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
